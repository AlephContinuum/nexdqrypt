  <!-- ===================== JAVASCRIPT ===================== -->
  <script>
    /* === Loader === */
    (function () {
      var loader = document.getElementById('loader');
      function hideLoader() {
        loader.classList.add('loaded');
        setTimeout(function () { loader.style.display = 'none'; }, 800);
      }
      if (document.readyState === 'complete') {
        setTimeout(hideLoader, 1200);
      } else {
        window.addEventListener('load', function () { setTimeout(hideLoader, 1200); });
      }
    })();

    /* === Countdown (30 days from now) === */
    (function () {
      var target = new Date();
      target.setDate(target.getDate() + 30);
      var daysEl  = document.getElementById('cd-days');
      var hrsEl   = document.getElementById('cd-hours');
      var minsEl  = document.getElementById('cd-mins');
      var secsEl  = document.getElementById('cd-secs');

      function pad(n) { return n < 10 ? '0' + n : String(n); }

      function animateValue(el, newVal) {
        var formatted = pad(newVal);
        if (el.textContent !== formatted) {
          el.classList.add('flip');
          setTimeout(function () {
            el.textContent = formatted;
            el.classList.remove('flip');
          }, 250);
        }
      }

      function tick() {
        var now  = new Date().getTime();
        var diff = target.getTime() - now;
        if (diff <= 0) { diff = 0; }

        var d = Math.floor(diff / 86400000);
        var h = Math.floor((diff % 86400000) / 3600000);
        var m = Math.floor((diff % 3600000) / 60000);
        var s = Math.floor((diff % 60000) / 1000);

        animateValue(daysEl, d);
        animateValue(hrsEl, h);
        animateValue(minsEl, m);
        animateValue(secsEl, s);
      }

      tick();
      setInterval(tick, 1000);
    })();

    /* === Email Signup === */
    (function () {
      var form = document.getElementById('signup-form');
      var input = document.getElementById('email-input');
      var btn   = document.getElementById('btn-notify');
      var msg   = document.getElementById('signup-msg');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = input.value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          msg.textContent = 'Please enter a valid email address.';
          msg.className = 'signup-msg error';
          return;
        }
        btn.disabled = true;
        btn.querySelector('.btn-text').textContent = 'Sending…';

        setTimeout(function () {
          msg.textContent = '🎉 Awesome! You\'ll be the first to know when we launch.';
          msg.className = 'signup-msg success';
          input.value = '';
          btn.disabled = false;
          btn.querySelector('.btn-text').textContent = 'Notify Me';
        }, 1200);
      });
    })();
  </script>
